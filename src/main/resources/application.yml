server:
  port: 8080

spring:
  application:
    name: music-downloader

# Gateway 模块配置：真实远端地址、路径和密钥只从环境变量或本机 .env 读取。
music:
  gateway:
    base-url: ${MUSIC_GATEWAY_BASE_URL:}
    timeout: 15s
    user-agent: Mozilla/5.0 MusicDownloader/1.0
    api-key: ${MUSIC_GATEWAY_API_KEY:}
    candidates:
      search:
        - "${MUSIC_GATEWAY_SEARCH_PATH:}"
      song:
        - "${MUSIC_GATEWAY_SONG_PATH:}"
      download:
        - "${MUSIC_GATEWAY_DOWNLOAD_PATH:}"
      lyric:
        - "${MUSIC_GATEWAY_LYRIC_PATH:}"
      artist:
        - "${MUSIC_GATEWAY_ARTIST_PATH:}"
      playlist:
        - "${MUSIC_GATEWAY_PLAYLIST_PATH:}"
      album:
        - "${MUSIC_GATEWAY_ALBUM_PATH:}"
