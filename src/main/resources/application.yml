server:
  port: 8080

spring:
  application:
    name: music-downloader

# Gateway 模块配置：Java 代码只认 operation，具体 REST 路径在这里维护。
music:
  gateway:
    base-url: https://gateway.karpov.cn/api/proxy
    timeout: 15s
    user-agent: Mozilla/5.0 MusicDownloader/1.0
    api-key: ${MUSIC_GATEWAY_API_KEY:}
    candidates:
      search:
        - "/{platform}/search/songs?q={keyword}&page={page}&page_size={limit}"
      song:
        - "/{platform}/songs/{id}"
      download:
        - "/{platform}/songs/{id}/url?quality={quality}"
      lyric:
        - "/{platform}/songs/{id}/lyric"
      artist:
        - "/{platform}/artists/{id}"
      playlist:
        - "/{platform}/playlists/{id}"
      album:
        - "/{platform}/albums/{id}"
